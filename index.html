<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Boss Study Planner 💜👑</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

/* BACKGROUND */
body{
  height:100vh;
  background:linear-gradient(135deg,#e6e6fa,#c084fc,#f3e8ff);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* GLASS */
.glass{
  background:rgba(255,255,255,0.3);
  backdrop-filter:blur(15px);
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* LOGIN */
.login{
  width:320px;
  padding:25px;
  text-align:center;
}

.login h2{margin-bottom:10px}

input,select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#9333ea;
  color:white;
  cursor:pointer;
}

button:hover{background:#7e22ce}

/* APP */
.app{
  width:95%;
  height:95vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  padding:20px;
}

.avatar{
  width:60px;height:60px;
  border-radius:50%;
  background:#9333ea;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:24px;
  margin-bottom:10px;
}

.nav button{background:#c084fc;margin-top:5px}

/* MAIN */
.main{
  flex:1;
  padding:20px;
  overflow:auto;
}

/* CARD */
.card{
  padding:15px;
  margin-bottom:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* TASK */
.task{
  display:flex;
  justify-content:space-between;
  background:white;
  padding:8px;
  margin-top:8px;
  border-radius:8px;
}

/* BAR */
.bar{height:10px;background:#ddd;border-radius:10px}
.fill{height:100%;background:#9333ea}

/* TIMER */
.timer{text-align:center;font-size:28px}

/* TABLE */
table{width:100%;margin-top:10px}
td{
  border:1px solid #aaa;
  padding:10px;
  text-align:center;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
let user = JSON.parse(localStorage.getItem("user"));
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let goals = JSON.parse(localStorage.getItem("goals")) || [];
let timetable = JSON.parse(localStorage.getItem("table")) || [];
let xp = parseInt(localStorage.getItem("xp")) || 0;

let section="dashboard";

/* RENDER */
function render(){
  const app=document.getElementById("app");

  if(!user){
    app.innerHTML=`
    <div class="glass login">
      <h2>💜 Welcome</h2>
      <p>Study Planner</p>
      <input id="name" placeholder="Name">
      <input id="email" placeholder="Email">
      <input id="pass" type="password" placeholder="Password">
      <button onclick="signup()">Signup</button>
      <button onclick="login()">Login</button>
    </div>`;
  } else {
    app.innerHTML=`
    <div class="app glass">

      <div class="sidebar">
        <div class="avatar">${user.name[0]}</div>
        <h3>${user.name}</h3>

        <div class="nav">
          <button onclick="nav('dashboard')">Dashboard</button>
          <button onclick="nav('tasks')">Tasks</button>
          <button onclick="nav('timetable')">Timetable</button>
          <button onclick="nav('focus')">Focus</button>
          <button onclick="nav('goals')">Goals</button>
          <button onclick="logout()">Logout</button>
        </div>
      </div>

      <div class="main" id="main"></div>

    </div>`;
    load();
  }
}

/* NAV */
function nav(s){section=s; load();}

/* LOAD SECTION */
function load(){
  const main=document.getElementById("main");

  /* DASHBOARD */
  if(section==="dashboard"){
    const done=tasks.filter(t=>t.done).length;
    const percent=tasks.length?(done/tasks.length)*100:0;
    const level=Math.floor(xp/100);

    main.innerHTML=`
      <div class="grid">

        <div class="card glass">
          <h2>📊 Progress</h2>
          <div class="bar"><div class="fill" style="width:${percent}%"></div></div>
          <p>${Math.floor(percent)}% done</p>
          <p>XP: ${xp} | Level: ${level}</p>
        </div>

        <div class="card glass">
          <h2>🧠 Motivation</h2>
          <p id="quote"></p>
          <button onclick="quote()">New</button>
        </div>

      </div>`;
    quote();
  }

  /* TASKS */
  if(section==="tasks"){
    main.innerHTML=`
      <div class="card glass">
        <h2>📋 Tasks</h2>
        <input id="task">
        <select id="cat">
          <option>Study</option>
          <option>Exam</option>
        </select>
        <button onclick="addTask()">Add</button>
        <div id="list"></div>
      </div>`;
    showTasks();
  }

  /* GOALS */
  if(section==="goals"){
    main.innerHTML=`
      <div class="card glass">
        <h2>🎯 Goals</h2>
        <input id="goal">
        <button onclick="addGoal()">Add</button>
        <div id="glist"></div>
      </div>`;
    showGoals();
  }

  /* TIMETABLE */
  if(section==="timetable"){
    main.innerHTML=`
      <div class="card glass">
        <h2>📅 Timetable</h2>
        <table id="table"></table>
      </div>`;
    buildTable();
  }

  /* FOCUS */
  if(section==="focus"){
    main.innerHTML=`
      <div class="card glass">
        <h2>⏳ Focus Mode</h2>
        <div class="timer" id="timer">25:00</div>
        <button onclick="start()">Start</button>
      </div>`;
  }
}

/* AUTH */
function signup(){
  const name=document.getElementById("name").value;
  if(!name) return alert("Enter name!");
  user={name};
  localStorage.setItem("user",JSON.stringify(user));
  render();
}
function login(){
  signup();
}
function logout(){
  localStorage.clear();
  location.reload();
}

/* TASKS */
function addTask(){
  const t=document.getElementById("task").value;
  const c=document.getElementById("cat").value;
  tasks.push({text:t,cat:c,done:false});
  localStorage.setItem("tasks",JSON.stringify(tasks));
  load();
}
function showTasks(){
  const list=document.getElementById("list");
  list.innerHTML="";
  tasks.forEach((t,i)=>{
    list.innerHTML+=`
    <div class="task">
      <span onclick="toggle(${i})">${t.done?"✅":""} ${t.text}</span>
      <span onclick="del(${i})">❌</span>
    </div>`;
  });
}
function toggle(i){
  tasks[i].done=!tasks[i].done;
  if(tasks[i].done) xp+=10;
  localStorage.setItem("tasks",JSON.stringify(tasks));
  localStorage.setItem("xp",xp);
  load();
}
function del(i){
  tasks.splice(i,1);
  localStorage.setItem("tasks",JSON.stringify(tasks));
  load();
}

/* GOALS */
function addGoal(){
  const g=document.getElementById("goal").value;
  goals.push(g);
  localStorage.setItem("goals",JSON.stringify(goals));
  load();
}
function showGoals(){
  const g=document.getElementById("glist");
  g.innerHTML="";
  goals.forEach(x=>g.innerHTML+=`<div class="task">${x}</div>`);
}

/* TIMETABLE */
function buildTable(){
  const table=document.getElementById("table");
  table.innerHTML="";
  for(let i=0;i<5;i++){
    let row="<tr>";
    for(let j=0;j<5;j++){
      const val=timetable[i]?.[j]||"+";
      row+=`<td onclick="edit(${i},${j},this)">${val}</td>`;
    }
    row+="</tr>";
    table.innerHTML+=row;
  }
}
function edit(i,j,cell){
  const val=prompt("Enter subject");
  if(!timetable[i]) timetable[i]=[];
  timetable[i][j]=val;
  localStorage.setItem("table",JSON.stringify(timetable));
  cell.innerText=val;
}

/* TIMER */
let time=1500,timer;
function start(){
  timer=setInterval(()=>{
    if(time>0){
      time--;
      const m=Math.floor(time/60);
      const s=time%60;
      document.getElementById("timer").innerText=`${m}:${s<10?'0':''}${s}`;
    }
  },1000);
}

/* QUOTES */
function quote(){
  const q=["Win today 💜","No excuses 🔥","Focus now 🚀"];
  document.getElementById("quote").innerText=q[Math.floor(Math.random()*q.length)];
}

render();
</script>

</body>
</html>
