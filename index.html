<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuro AI Study Planner 💜</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

/* BACKGROUND */
body{
  height:100vh;
  background:linear-gradient(135deg,#e6e6fa,#c084fc,#f3e8ff);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* GLASS */
.glass{
  background:rgba(255,255,255,0.3);
  backdrop-filter:blur(15px);
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* LOGIN */
.login{
  width:320px;
  padding:25px;
  text-align:center;
}

/* APP */
.app{
  width:95%;
  height:95vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  padding:20px;
}

.sidebar button{
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#a855f7;
  color:white;
  cursor:pointer;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
  overflow:auto;
}

/* CARD */
.card{
  padding:15px;
  margin-bottom:20px;
}

/* TASK */
.task{
  background:white;
  padding:8px;
  margin-top:8px;
  border-radius:8px;
  cursor:pointer;
}

/* HEATMAP */
.heatmap{
  display:grid;
  grid-template-columns:repeat(10,20px);
  gap:5px;
}
.cell{
  width:20px;height:20px;
  background:#ddd;
}
.high{background:#a855f7}

/* ENERGY */
.energy{height:10px;background:#ddd;border-radius:10px}
.energy-fill{height:100%;background:lime}

/* TIMER */
.timer{text-align:center;font-size:26px}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#9333ea;
  color:white;
}

/* FOCUS MODE */
.focus{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  color:white;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:30px;
}
</style>
</head>

<body>

<div id="app"></div>
<div id="focusScreen" class="focus"></div>

<script>
let user = JSON.parse(localStorage.getItem("user"));
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let subjects = JSON.parse(localStorage.getItem("subjects")) || [];
let exams = JSON.parse(localStorage.getItem("exams")) || [];
let heat = JSON.parse(localStorage.getItem("heat")) || [];
let energy = parseInt(localStorage.getItem("energy")) || 100;

let section="dashboard";

/* RENDER */
function render(){
  const app=document.getElementById("app");

  if(!user){
    app.innerHTML=`
    <div class="glass login">
      <h2>💜 Neuro Planner</h2>
      <input id="name" placeholder="Enter name">
      <button onclick="login()">Start</button>
    </div>`;
  } else {
    app.innerHTML=`
    <div class="app glass">

      <div class="sidebar">
        <h3>${user.name}</h3>
        <button onclick="nav('dashboard')">Dashboard</button>
        <button onclick="nav('tasks')">Tasks</button>
        <button onclick="nav('ai')">AI Brain</button>
        <button onclick="nav('focus')">Focus</button>
        <button onclick="logout()">Logout</button>
      </div>

      <div class="main" id="main"></div>

    </div>`;
    load();
  }
}

/* NAV */
function nav(s){section=s; load();}

/* LOAD */
function load(){
  const main=document.getElementById("main");

  if(section==="dashboard"){
    main.innerHTML=`
      <div class="card glass">
        <h2>🔥 Heatmap</h2>
        <div class="heatmap" id="heatmap"></div>
      </div>

      <div class="card glass">
        <h2>⚡ Energy</h2>
        <div class="energy">
          <div class="energy-fill" id="energyFill"></div>
        </div>
      </div>
    `;
    renderHeatmap();
    updateEnergy();
  }

  if(section==="tasks"){
    main.innerHTML=`
      <div class="card glass">
        <h2>📋 Tasks</h2>
        <input id="task">
        <button onclick="addTask()">Add Task</button>
        <div id="list"></div>
      </div>
    `;
    renderTasks();
  }

  if(section==="ai"){
    main.innerHTML=`
      <div class="card glass">
        <h2>🤖 AI Brain</h2>

        <input id="sub" placeholder="Subject">
        <button onclick="addSubject()">Add Subject</button>

        <input id="examSub" placeholder="Exam Subject">
        <input id="examDate" type="date">
        <button onclick="addExam()">Add Exam</button>

        <button onclick="generatePlan()">Generate Plan</button>

        <div id="suggestion"></div>
        <div id="plan"></div>
      </div>
    `;
    suggest();
  }

  if(section==="focus"){
    main.innerHTML=`
      <div class="card glass">
        <h2>⚡ Focus Mode</h2>
        <button onclick="startFocus()">Start Deep Focus</button>
      </div>
    `;
  }
}

/* LOGIN */
function login(){
  const name=document.getElementById("name").value;
  if(!name) return alert("Enter name!");
  user={name};
  localStorage.setItem("user",JSON.stringify(user));
  render();
}

function logout(){
  localStorage.clear();
  location.reload();
}

/* TASKS */
function addTask(){
  const t=document.getElementById("task").value;
  tasks.push({text:t});
  localStorage.setItem("tasks",JSON.stringify(tasks));
  load();
}

function renderTasks(){
  const list=document.getElementById("list");
  list.innerHTML="";
  tasks.forEach((t,i)=>{
    list.innerHTML+=`
    <div class="task" onclick="complete(${i})">${t.text}</div>`;
  });
}

function complete(i){
  energy-=10;
  heat.push(3);
  tasks.splice(i,1);
  save();
  load();
}

/* ENERGY */
function updateEnergy(){
  document.getElementById("energyFill").style.width=energy+"%";
}

/* HEATMAP */
function renderHeatmap(){
  const map=document.getElementById("heatmap");
  map.innerHTML="";
  for(let i=0;i<50;i++){
    const val=heat[i]||0;
    map.innerHTML+=`<div class="cell ${val>2?'high':''}"></div>`;
  }
}

/* AI */
function addSubject(){
  const s=document.getElementById("sub").value;
  subjects.push({name:s,weak:0});
  save();
}

function addExam(){
  const name=document.getElementById("examSub").value;
  const date=document.getElementById("examDate").value;
  exams.push({name,date});
  save();
}

function generatePlan(){
  let plan=[];
  exams.forEach(e=>{
    let days=(new Date(e.date)-new Date())/(1000*60*60*24);
    plan.push({name:e.name,priority:100-days});
  });
  plan.sort((a,b)=>b.priority-a.priority);

  const div=document.getElementById("plan");
  div.innerHTML="";
  plan.forEach(p=>{
    div.innerHTML+=`<div class="task">${p.name} 🔥</div>`;
  });
}

function suggest(){
  if(subjects.length===0) return;
  subjects.sort((a,b)=>b.weak-a.weak);
  document.getElementById("suggestion").innerText=
    "Focus on: "+subjects[0].name;
}

/* FOCUS */
function startFocus(){
  if(tasks.length===0) return;

  const screen=document.getElementById("focusScreen");
  screen.innerText=tasks[0].text;
  screen.style.display="flex";

  setTimeout(()=>screen.style.display="none",5000);
}

/* SAVE */
function save(){
  localStorage.setItem("tasks",JSON.stringify(tasks));
  localStorage.setItem("subjects",JSON.stringify(subjects));
  localStorage.setItem("exams",JSON.stringify(exams));
  localStorage.setItem("heat",JSON.stringify(heat));
  localStorage.setItem("energy",energy);
}

/* INIT */
render();
</script>

</body>
</html>
